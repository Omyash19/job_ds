name: Daily Job Scraper

# This determines WHEN the script runs
on:
  workflow_dispatch: # Allows you to manually click "Run workflow"
  schedule:
    - cron: '0 0 * * *' # Runs automatically every day at midnight UTC

jobs:
  extract-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Extraction Script
        env:
          # This securely pulls the secrets you saved in GitHub Settings
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_API_KEY: ${{ secrets.ADZUNA_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python extract_jobs.py
